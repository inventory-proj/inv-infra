apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-script
data:
  init.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<EOSQL
    CREATE EXTENSION IF NOT EXISTS pgcrypto;
    CREATE TABLE IF NOT EXISTS roles (
        id SERIAL PRIMARY KEY,
        role_name VARCHAR(50) UNIQUE NOT NULL
    );
    CREATE TABLE IF NOT EXISTS users (
        id SERIAL PRIMARY KEY,
        username VARCHAR(50) UNIQUE NOT NULL,
        password_hash VARCHAR(255) NOT NULL,
        role_id INT REFERENCES roles(id)
    );
    CREATE TABLE IF NOT EXISTS environments (
        id SERIAL PRIMARY KEY,
        env_name VARCHAR(50) UNIQUE NOT NULL
    );
    CREATE TABLE IF NOT EXISTS clusters (
        id SERIAL PRIMARY KEY,
        cluster_name VARCHAR(100) UNIQUE NOT NULL,
        env_id INT REFERENCES environments(id)
    );
    CREATE TABLE IF NOT EXISTS servers (
        id SERIAL PRIMARY KEY,
        hostname VARCHAR(100) UNIQUE NOT NULL,
        ip_address INET NOT NULL,
        cluster_id INT REFERENCES clusters(id),
        status VARCHAR(20) DEFAULT 'active' CHECK (status IN ('active', 'offline', 'maintenance', 'archived'))
    );
    CREATE TABLE IF NOT EXISTS containers (
        id SERIAL PRIMARY KEY,
        container_name VARCHAR(100) NOT NULL,
        image_name VARCHAR(100) NOT NULL,
        server_id INT REFERENCES servers(id),
        is_running BOOLEAN DEFAULT TRUE
    );
    CREATE TABLE IF NOT EXISTS incidents (
        id SERIAL PRIMARY KEY,
        server_id INT REFERENCES servers(id),
        reporter_id INT REFERENCES users(id),
        description TEXT NOT NULL,
        status VARCHAR(20) DEFAULT 'open' CHECK (status IN ('open', 'in_progress', 'resolved')),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    CREATE TABLE IF NOT EXISTS incident_logs (
        id SERIAL PRIMARY KEY,
        incident_id INT REFERENCES incidents(id),
        old_status VARCHAR(20),
        new_status VARCHAR(20),
        change_time TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    CREATE OR REPLACE FUNCTION log_incident_status_change()
    RETURNS TRIGGER AS \$\$
    BEGIN
        IF OLD.status != NEW.status THEN
            INSERT INTO incident_logs (incident_id, old_status, new_status)
            VALUES (NEW.id, OLD.status, NEW.status);
        END IF;
        RETURN NEW;
    END;
    \$\$ LANGUAGE plpgsql;
    CREATE OR REPLACE TRIGGER trigger_log_incident_status
    AFTER UPDATE ON incidents
    FOR EACH ROW EXECUTE FUNCTION log_incident_status_change();
    CREATE OR REPLACE PROCEDURE enable_maintenance(p_server_id INT)
    LANGUAGE plpgsql AS \$\$
    BEGIN
        UPDATE servers SET status = 'maintenance' WHERE id = p_server_id;
        UPDATE containers SET is_running = FALSE WHERE server_id = p_server_id;
    END;
    \$\$;
    INSERT INTO roles (id, role_name) VALUES (1, 'admin'), (2, 'devops'), (3, 'viewer') ON CONFLICT (id) DO NOTHING;
    INSERT INTO users (username, password_hash, role_id)
    VALUES ('administrator', crypt('${ADMIN_WEB_PASSWORD}', gen_salt('bf')), 1)
    ON CONFLICT (username) DO NOTHING;
    EOSQL
